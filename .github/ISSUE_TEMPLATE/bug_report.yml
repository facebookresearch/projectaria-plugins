name: 🐛 Bug report
description: Something in a Project Aria plugin or skill is broken.
title: "[Bug] "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
        Please fill out the sections below so we can reproduce the issue.

  - type: dropdown
    id: plugin
    attributes:
      label: Which plugin?
      options:
        - aria-ark
        - other (specify below)
    validations:
      required: true

  - type: input
    id: skill
    attributes:
      label: Which skill (if applicable)?
      placeholder: e.g. projectaria-tools, vrs-health-check
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Install the plugin via `claude plugin install aria-ark@projectaria-plugins`
        2. Ask Claude to "...".
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Claude Code / CLI version, OS, Python version, etc.
      render: shell
      placeholder: |
        - Claude Code version:
        - OS:
        - Python:
        - Node:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      render: shell
    validations:
      required: false
