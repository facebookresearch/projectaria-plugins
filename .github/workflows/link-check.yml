name: Link check

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/link-check.yml"
      - "lychee.toml"
  schedule:
    # Weekly on Monday 09:00 UTC to catch external link rot.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --cache --base . "**/*.md"
          output: ./lychee/out.md
          fail: true

      - name: Create issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link check failed on ${{ github.ref_name }}"
          content-filepath: ./lychee/out.md
          labels: documentation, broken-link
