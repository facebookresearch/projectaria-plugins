# Ruff configuration for validation scripts.
# https://docs.astral.sh/ruff/configuration/

target-version = "py312"
line-length = 88

[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
  "SIM", # flake8-simplify
  "C4",  # flake8-comprehensions
]
ignore = [
  "E501", # line length is handled by formatter
]

[lint.per-file-ignores]
"scripts/*.py" = ["T201"]  # allow print in CLI scripts

[format]
quote-style = "double"
indent-style = "space"
